name: "Quick Test: Single Action"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Which action to test"
        required: true
        type: choice
        options:
          - action-login
          - action-build
          - action-run
          - action-deploy
          - action-create
          - action-destroy
          - action-exec
          - action-export
      branch:
        description: "Branch/SHA to test (e.g., 'feature/pseudo-tty-fix')"
        required: true
        default: "v2"

env:
  APP_NAME: actions-test-primary

jobs:
  test-login:
    name: "Test action-login"
    if: github.event.inputs.action == 'action-login'
    runs-on: ubuntu-latest
    steps:
      - name: Login
        uses: convox/action-login@${{ github.event.inputs.branch }}
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      - name: Verify
        run: |
          convox racks
          echo "Login works on branch ${{ github.event.inputs.branch }}"

  test-build:
    name: "Test action-build"
    if: github.event.inputs.action == 'action-build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: convox/action-login@v2
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      - name: Build
        id: build
        uses: convox/action-build@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}

      - name: Verify
        run: |
          echo "Release: ${{ steps.build.outputs.release }}"
          convox releases info ${{ steps.build.outputs.release }} \
            --app ${{ env.APP_NAME }} --rack ${{ secrets.CONVOX_RACK }}
          echo "Build works on branch ${{ github.event.inputs.branch }}"

  test-run:
    name: "Test action-run"
    if: github.event.inputs.action == 'action-run'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: convox/action-login@v2
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      # TTY test
      - name: "Test 1: TTY output"
        uses: convox/action-run@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}
          service: web
          command: "node src/test-tty.js"

      # Long output / hang test
      - name: "Test 2: Long output (hang test)"
        uses: convox/action-run@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}
          service: web
          command: "node src/test-long-output.js"

      # Exit code success
      - name: "Test 3: Exit code 0"
        uses: convox/action-run@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}
          service: web
          command: "node src/test-exit-codes.js 0"

      # Exit code failure
      - name: "Test 4: Exit code 1 (expect failure)"
        id: fail_test
        continue-on-error: true
        uses: convox/action-run@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}
          service: web
          command: "node src/test-exit-codes.js 1"

      - name: "Verify exit code propagation"
        run: |
          if [ "${{ steps.fail_test.outcome }}" != "failure" ]; then
            echo "::error::Expected failure but got '${{ steps.fail_test.outcome }}'"
            exit 1
          fi
          echo "Exit code propagation works"

      # Migration simulation
      - name: "Test 5: Simulated migration"
        uses: convox/action-run@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}
          service: web
          command: "node src/migrate.js"

      - name: Summary
        run: echo "All action-run tests passed on branch ${{ github.event.inputs.branch }}"

  test-deploy:
    name: "Test action-deploy"
    if: github.event.inputs.action == 'action-deploy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: convox/action-login@v2
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      - name: Deploy
        uses: convox/action-deploy@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}
          password: ${{ secrets.CONVOX_PASSWORD }}
          host: ${{ secrets.CONVOX_HOST }}

      - name: Verify
        run: |
          convox services --app ${{ env.APP_NAME }} --rack ${{ secrets.CONVOX_RACK }}
          echo "Deploy works on branch ${{ github.event.inputs.branch }}"

  test-create:
    name: "Test action-create"
    if: github.event.inputs.action == 'action-create'
    runs-on: ubuntu-latest
    steps:
      - uses: convox/action-login@v2
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      - name: Cleanup (if exists)
        continue-on-error: true
        run: convox apps delete actions-test-create --rack ${{ secrets.CONVOX_RACK }} --wait

      - name: Create
        uses: convox/action-create@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: actions-test-create

      - name: Verify
        run: |
          convox apps info --app actions-test-create --rack ${{ secrets.CONVOX_RACK }}
          echo "Create works on branch ${{ github.event.inputs.branch }}"

      - name: Cleanup
        if: always()
        continue-on-error: true
        run: convox apps delete actions-test-create --rack ${{ secrets.CONVOX_RACK }}

  test-destroy:
    name: "Test action-destroy"
    if: github.event.inputs.action == 'action-destroy'
    runs-on: ubuntu-latest
    steps:
      - uses: convox/action-login@v2
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      # Create a temporary app to destroy
      - name: Create temp app
        run: convox apps create actions-test-destroy --rack ${{ secrets.CONVOX_RACK }} --wait

      - name: Destroy
        uses: convox/action-destroy@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: actions-test-destroy

      - name: Verify
        run: |
          sleep 10
          if convox apps info --app actions-test-destroy --rack ${{ secrets.CONVOX_RACK }} 2>/dev/null; then
            echo "::warning::App may still be deleting"
          else
            echo "Destroy works on branch ${{ github.event.inputs.branch }}"
          fi

  test-exec:
    name: "Test action-exec"
    if: github.event.inputs.action == 'action-exec'
    runs-on: ubuntu-latest
    steps:
      - uses: convox/action-login@v2
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      - name: Exec
        uses: convox/action-exec@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}
          service: web
          command: "node src/test-env.js"

      - name: Summary
        run: echo "Exec works on branch ${{ github.event.inputs.branch }}"

  test-export:
    name: "Test action-export"
    if: github.event.inputs.action == 'action-export'
    runs-on: ubuntu-latest
    steps:
      - uses: convox/action-login@v2
        with:
          host: ${{ secrets.CONVOX_HOST }}
          password: ${{ secrets.CONVOX_PASSWORD }}

      - name: Export
        uses: convox/action-export@${{ github.event.inputs.branch }}
        with:
          rack: ${{ secrets.CONVOX_RACK }}
          app: ${{ env.APP_NAME }}

      - name: Summary
        run: echo "Export works on branch ${{ github.event.inputs.branch }}"
